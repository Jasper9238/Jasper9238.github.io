<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Hub | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .qr-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: 10px; display: inline-block; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 40px; background: #007bff; color: white; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Press+Start+2P&family=Tiny5&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://qr-generator-backend.jasperhung887.workers.dev">
    <link rel="dns-prefetch" href="https://qr-generator-backend.jasperhung887.workers.dev">
</head>
<body>
    <nav>
        <h2 style="font-family: Verdana, Geneva, Tahoma, sans-serif;">Jasper's QR Hub</h2>
        <button onclick="logout()" style="background: #dc3545; color:white; font-family:fantasy; font-weight: 400; font-style: bold; font-size: 20px;">Logout</button>
    </nav>

    <div style="padding: 40px;">
        <div class="create-box" style="background: white; padding: 20px; border-radius: 10px;">
            <h3 style="font-family: 'Press Start 2P', system-ui;">Create a Dynamic QR</h3>
            <input type="url" id="targetUrl" required placeholder="https://example.com" style="width: 60%;">
            <button onclick="generateQR()" style="font-family: 'Press Start 2P', system-ui; font-size: 10px;" id="generate-btn">Generate</button>
        </div>

        <hr style="margin: 30px 0;">
        <h2>Your Codes</h2>
        <div id="qr-grid" class="grid">
            <div id="qr-result" style="min-height: 150px;"></div> 
            <button id="download-btn" style="display: none;">Download QR Code</button>
        </div>
        
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
